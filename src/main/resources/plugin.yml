name: Axentra
version: 1.3.0
main: mc.ollie.App
api-version: 1.21
description: A custom server management plugin
author: OlliesWorld

commands:
  help:
    description: Shows all available commands
    usage: /help
  clear:
    description: Clears the player's inventory
    usage: /clear [player]
    aliases: [c]
    permission: Axentra.clear
    permission-message: ""
  repair:
    description: Repairs the item in your hand
    usage: /repair
    aliases: [r]
    permission: Axentra.repair
    permission-message: ""
  kick:
    description: Kicks a player from the server
    usage: /kick <player> [reason]
    permission: Axentra.kick
    permission-message: ""
  tempban:
    description: Temporarily bans a player from the server
    usage: /tempban <player> <duration> [reason]
    permission: Axentra.tempban
    permission-message: ""
  ban:
    description: Bans a player from the server
    usage: /ban <player> [reason]
    permission: Axentra.ban
    permission-message: ""
  tempbanip:
    description: Temporarily bans an IP address from the server
    usage: /tempbanip <player|ip> <duration> [reason]
    permission: Axentra.tempbanip
    permission-message: ""
  banip:
    description: Bans an IP address from the server
    usage: /banip <player|ip> [reason]
    permission: Axentra.banip
    permission-message: ""
  unbanip:
    description: Unbans an IP address from the server
    usage: /unbanip <ip>
    permission: Axentra.unbanip
    permission-message: ""
  unban:
    description: Unbans a player from the server
    usage: /unban <player>
    permission: Axentra.unban
    permission-message: ""
  fly:
    description: Toggle flight mode for yourself or others
    usage: /fly [player]
    permission: Axentra.fly
    permission-message: ""
  feed:
    description: Feed yourself or another player
    usage: /feed [player]
    permission: Axentra.feed
    permission-message: ""
  heal:
    description: Heal yourself or another player
    usage: /heal [player]
    permission: Axentra.heal
    permission-message: ""
  warn:
    description: Warns a player
    usage: /warn <player> [reason]
    permission: Axentra.warn
    permission-message: ""
  warns:
    description: View a player's warnings
    usage: /warns [player]
    permission: Axentra.warns
    permission-message: ""
  clearwarns:
    description: Clears all warnings for a player
    usage: /clearwarns <player>
    permission: Axentra.clearwarns
    permission-message: ""
  mute:
    description: Mutes a player, preventing them from chatting
    usage: /mute <player> [reason]
    permission: Axentra.mute
    permission-message: ""
  unmute:
    description: Unmutes a player
    usage: /unmute <player>
    permission: Axentra.unmute
    permission-message: ""
  anvil:
    description: Opens an anvil
    usage: /anvil
    permission: Axentra.anvil
    permission-message: ""
  workbench:
    description: Opens a crafting table
    usage: /workbench
    aliases: [wb, craft, craftingtable]
    permission: Axentra.workbench
    permission-message: ""
  cartography:
    description: Opens a cartography table
    usage: /cartography
    aliases: [cartographytable, carto]
    permission: Axentra.cartography
    permission-message: ""
  grindstone:
    description: Opens a grindstone
    usage: /grindstone
    aliases: [grind]
    permission: Axentra.grindstone
    permission-message: ""
  loom:
    description: Opens a loom
    usage: /loom
    permission: Axentra.loom
    permission-message: ""
  smithingtable:
    description: Opens a smithing table
    usage: /smithingtable
    aliases: [smithing, smith]
    permission: Axentra.smithingtable
    permission-message: ""
  stonecutter:
    description: Opens a stonecutter
    usage: /stonecutter
    aliases: [stone]
    permission: Axentra.stonecutter
    permission-message: ""
  enderchest:
    description: Opens your ender chest
    usage: /enderchest
    aliases: [ec, echest]
    permission: Axentra.enderchest
    permission-message: ""
  ping:
    description: Check your ping or another player's ping
    usage: /ping [player]
    permission: Axentra.ping
    permission-message: ""
  suicide:
    description: Kill yourself
    usage: /suicide
    permission: Axentra.suicide
    permission-message: ""
  weather:
    description: Set the weather in the world
    usage: /weather <clear|rain|storm>
    permission: Axentra.weather
    permission-message: ""
  sun:
    description: Set the weather to clear
    usage: /sun
    permission: Axentra.weather
    permission-message: ""
  sky:
    description: Set the weather to clear
    usage: /sky
    permission: Axentra.weather
    permission-message: ""
  rain:
    description: Set the weather to rain
    usage: /rain
    permission: Axentra.weather
    permission-message: ""
  storm:
    description: Set the weather to a thunderstorm
    usage: /storm
    permission: Axentra.weather
    permission-message: ""
  hat:
    description: Place the item in your hand on your head
    usage: /hat
    permission: Axentra.hat
    permission-message: ""
  speed:
    description: Set your walk or fly speed
    usage: /speed <1-10|reset> [walk|fly] [player]
    permission: Axentra.speed
    permission-message: ""
  gamemode:
    description: Change your or another player's gamemode
    usage: /gamemode <survival|creative|adventure|spectator> [player]
    aliases: [gm]
    permission: Axentra.gamemode
    permission-message: ""
  gms:
    description: Switch to survival mode
    usage: /gms [player]
    permission: Axentra.gamemode
    permission-message: ""
  gmc:
    description: Switch to creative mode
    usage: /gmc [player]
    permission: Axentra.gamemode
    permission-message: ""
  gma:
    description: Switch to adventure mode
    usage: /gma [player]
    permission: Axentra.gamemode
    permission-message: ""
  gmsp:
    description: Switch to spectator mode
    usage: /gmsp [player]
    permission: Axentra.gamemode
    permission-message: ""
  time:
    description: Set or add time in the world
    usage: /time <set|add> <day|noon|night|midnight|ticks>
    permission: Axentra.time
    permission-message: ""
  day:
    description: Set the time to day
    usage: /day
    permission: Axentra.time
    permission-message: ""
  night:
    description: Set the time to night
    usage: /night
    permission: Axentra.time
    permission-message: ""
  noon:
    description: Set the time to noon
    usage: /noon
    permission: Axentra.time
    permission-message: ""
  midnight:
    description: Set the time to midnight
    usage: /midnight
    permission: Axentra.time
    permission-message: ""
  back:
    description: Teleport to your previous location
    usage: /back
    permission: Axentra.back
    permission-message: ""
  tpa:
    description: Send a teleport request to a player
    usage: /tpa <player>
    permission: Axentra.tpa
    permission-message: ""
  tpaccept:
    description: Accept an incoming teleport request
    usage: /tpaccept
    permission: Axentra.tpa
    permission-message: ""
  tpdeny:
    description: Deny an incoming teleport request
    usage: /tpdeny
    permission: Axentra.tpa
    permission-message: ""
  tpacancel:
    description: Cancel your outgoing teleport request
    usage: /tpacancel
    permission: Axentra.tpa
    permission-message: ""
  tptoggle:
    description: Toggle whether you can receive teleport requests
    usage: /tptoggle
    permission: Axentra.tpa
    permission-message: ""
  god:
    description: Toggle invincibility for yourself or others
    usage: /god [player]
    permission: Axentra.god
    permission-message: ""
  vanish:
    description: Toggle vanish mode for yourself or others
    usage: /vanish [player]
    aliases: [v]
    permission: Axentra.vanish
    permission-message: ""
  enderchestsee:
    description: View another player's ender chest
    usage: /enderchestsee <player>
    aliases: [ecsee, echestsee]
    permission: Axentra.enderchestsee
    permission-message: ""
  invsee:
    description: View another player's inventory
    usage: /invsee <player>
    permission: Axentra.invsee
    permission-message: ""
  spawn:
    description: Teleport to world spawn
    usage: /spawn [player]
    permission: Axentra.spawn
    permission-message: ""
  setspawn:
    description: Set the world spawn to your current location
    usage: /setspawn
    permission: Axentra.setspawn
    permission-message: ""
  axentra:
    description: Main Axentra command
    usage: /axentra <reload | upgrade | help | information>
    aliases: [ax]

permissions:
  Axentra.admin:
    description: Allows access to all /axentra subcommands
    default: op
  Axentra.clear:
    description: Allows the player to clear their inventory
    default: op
  Axentra.clear.others:
    description: Allows the player to clear others' inventory
    default: op
  Axentra.repair:
    description: Allows the player to repair their held item
    default: op
  Axentra.kick:
    description: Allows the player to kick others
    default: op
  Axentra.tempban:
    description: Allows the player to temporarily ban others
    default: op
  Axentra.tempbanip:
    description: Allows the player to temporarily ban IP addresses
    default: op
  Axentra.banip:
    description: Allows the player to ban IP addresses
    default: op
  Axentra.unbanip:
    description: Allows the player to unban IP addresses
    default: op
  Axentra.ban:
    description: Allows the player to ban others
    default: op
  Axentra.unban:
    description: Allows the player to unban others
    default: op
  Axentra.fly:
    description: Allows the player to toggle flight
    default: op
  Axentra.fly.others:
    description: Allows the player to toggle flight for others
    default: op
  Axentra.feed:
    description: Allows the player to feed themselves
    default: op
  Axentra.feed.others:
    description: Allows the player to feed others
    default: op
  Axentra.heal:
    description: Allows the player to heal themselves
    default: op
  Axentra.heal.others:
    description: Allows the player to heal others
    default: op
  Axentra.warn:
    description: Allows the player to warn others
    default: op
  Axentra.warns:
    description: Allows the player to view warnings
    default: op
  Axentra.clearwarns:
    description: Allows the player to clear warnings
    default: op
  Axentra.mute:
    description: Allows the player to mute others
    default: op
  Axentra.unmute:
    description: Allows the player to unmute others
    default: op
  Axentra.anvil:
    description: Allows the player to use /anvil
    default: op
  Axentra.workbench:
    description: Allows the player to use /workbench
    default: op
  Axentra.cartography:
    description: Allows the player to use /cartography
    default: op
  Axentra.grindstone:
    description: Allows the player to use /grindstone
    default: op
  Axentra.loom:
    description: Allows the player to use /loom
    default: op
  Axentra.smithingtable:
    description: Allows the player to use /smithingtable
    default: op
  Axentra.stonecutter:
    description: Allows the player to use /stonecutter
    default: op
  Axentra.enderchest:
    description: Allows the player to use /enderchest
    default: op
  Axentra.ping:
    description: Allows the player to check their own ping
    default: op
  Axentra.ping.others:
    description: Allows the player to check other players' ping
    default: op
  Axentra.suicide:
    description: Allows the player to use /suicide
    default: op
  Axentra.weather:
    description: Allows the player to change the weather
    default: op
  Axentra.hat:
    description: Allows the player to use /hat
    default: op
  Axentra.speed:
    description: Allows the player to set their own speed
    default: op
  Axentra.speed.others:
    description: Allows the player to set other players' speed
    default: op
  Axentra.gamemode:
    description: Allows the player to change their own gamemode
    default: op
  Axentra.gamemode.others:
    description: Allows the player to change other players' gamemode
    default: op
  Axentra.time:
    description: Allows the player to change the world time
    default: op
  Axentra.back:
    description: Allows the player to use /back
    default: true
  Axentra.tpa:
    description: Allows the player to use the TPA commands
    default: true
  Axentra.god:
    description: Allows the player to toggle god mode for themselves
    default: op
  Axentra.god.others:
    description: Allows the player to toggle god mode for others
    default: op
  Axentra.vanish:
    description: Allows the player to toggle vanish for themselves
    default: op
  Axentra.vanish.others:
    description: Allows the player to toggle vanish for others
    default: op
  Axentra.vanish.see:
    description: Allows the player to see vanished players
    default: op
  Axentra.enderchestsee:
    description: Allows the player to view other players' ender chests
    default: op
  Axentra.invsee:
    description: Allows the player to view other players' inventories
    default: op
  Axentra.spawn:
    description: Allows the player to teleport to spawn
    default: true
  Axentra.spawn.others:
    description: Allows the player to teleport others to spawn
    default: op
  Axentra.spawn.bypass:
    description: Allows the player to skip the /spawn countdown
    default: op
  Axentra.setspawn:
    description: Allows the player to set the world spawn
    default: op