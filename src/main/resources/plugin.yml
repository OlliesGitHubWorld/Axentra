name: Axentra
version: 1.1.0
main: mc.ollie.App
api-version: 1.21
description: A custom server management plugin
author: OlliesWorld

commands:
  help:
    description: Shows all available commands
    usage: /help
  clear:
    description: Clears the player's inventory
    usage: /clear [player]
    aliases: [c]
    permission: Axentra.clear
    permission-message: ""
  repair:
    description: Repairs the item in your hand
    usage: /repair
    aliases: [r]
    permission: Axentra.repair
    permission-message: ""
  kick:
    description: Kicks a player from the server
    usage: /kick <player> [reason]
    permission: Axentra.kick
    permission-message: ""
  tempban:
    description: Temporarily bans a player from the server
    usage: /tempban <player> <duration> [reason]
    permission: Axentra.tempban
    permission-message: ""
  ban:
    description: Bans a player from the server
    usage: /ban <player> [reason]
    permission: Axentra.ban
    permission-message: ""
  tempbanip:
    description: Temporarily bans an IP address from the server
    usage: /tempbanip <player|ip> <duration> [reason]
    permission: Axentra.tempbanip
    permission-message: ""
  banip:
    description: Bans an IP address from the server
    usage: /banip <player|ip> [reason]
    permission: Axentra.banip
    permission-message: ""
  unbanip:
    description: Unbans an IP address from the server
    usage: /unbanip <ip>
    permission: Axentra.unbanip
    permission-message: ""
  unban:
    description: Unbans a player from the server
    usage: /unban <player>
    permission: Axentra.unban
    permission-message: ""
  fly:
    description: Toggle flight mode for yourself or others
    usage: /fly [player]
    permission: Axentra.fly
    permission-message: ""
  feed:
    description: Feed yourself or another player
    usage: /feed [player]
    permission: Axentra.feed
    permission-message: ""
  heal:
    description: Heal yourself or another player
    usage: /heal [player]
    permission: Axentra.heal
    permission-message: ""
  warn:
    description: Warns a player
    usage: /warn <player> [reason]
    permission: Axentra.warn
    permission-message: ""
  warns:
    description: View a player's warnings
    usage: /warns [player]
    permission: Axentra.warns
    permission-message: ""
  clearwarns:
    description: Clears all warnings for a player
    usage: /clearwarns <player>
    permission: Axentra.clearwarns
    permission-message: ""
  mute:
    description: Mutes a player, preventing them from chatting
    usage: /mute <player> [reason]
    permission: Axentra.mute
    permission-message: ""
  unmute:
    description: Unmutes a player
    usage: /unmute <player>
    permission: Axentra.unmute
    permission-message: ""
  axentra:
    description: Main Axentra command
    usage: /axentra <reload | upgrade | help | information>
    aliases: [ax]

permissions:
  Axentra.admin:
    description: Allows access to all /axentra subcommands
    default: op
  Axentra.clear:
    description: Allows the player to clear their inventory
    default: op
  Axentra.clear.others:
    description: Allows the player to clear others' inventory
    default: op
  Axentra.repair:
    description: Allows the player to repair their held item
    default: op
  Axentra.kick:
    description: Allows the player to kick others
    default: op
  Axentra.tempban:
    description: Allows the player to temporarily ban others
    default: op
  Axentra.tempbanip:
    description: Allows the player to temporarily ban IP addresses
    default: op
  Axentra.banip:
    description: Allows the player to ban IP addresses
    default: op
  Axentra.unbanip:
    description: Allows the player to unban IP addresses
    default: op
  Axentra.ban:
    description: Allows the player to ban others
    default: op
  Axentra.unban:
    description: Allows the player to unban others
    default: op
  Axentra.fly:
    description: Allows the player to toggle flight
    default: op
  Axentra.fly.others:
    description: Allows the player to toggle flight for others
    default: op
  Axentra.feed:
    description: Allows the player to feed themselves
    default: op
  Axentra.feed.others:
    description: Allows the player to feed others
    default: op
  Axentra.heal:
    description: Allows the player to heal themselves
    default: op
  Axentra.heal.others:
    description: Allows the player to heal others
    default: op
  Axentra.warn:
    description: Allows the player to warn others
    default: op
  Axentra.warns:
    description: Allows the player to view warnings
    default: op
  Axentra.clearwarns:
    description: Allows the player to clear warnings
    default: op
  Axentra.mute:
    description: Allows the player to mute others
    default: op
  Axentra.unmute:
    description: Allows the player to unmute others
    default: op