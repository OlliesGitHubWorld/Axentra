# ┌─────────────────────────────────────────────────────────┐
# │                   Spawn Settings                        │
# └─────────────────────────────────────────────────────────┘

# The world whose spawn is used for join-location: spawn and the /spawn command.
# Leave empty to always use the server's default world (recommended).
# On multiworld servers, set this to prevent players in the nether/end being
# sent to those worlds' spawns instead of your main world's spawn.
spawn-world: ""

# Where should players be sent when they join the server?
#   last-location - Players join where they left off (default Minecraft behaviour)
#   spawn         - Players are always teleported to world spawn on join
join-location: last-location

# Show a countdown when a player uses /spawn.
# If the player moves during the countdown, the teleport is cancelled.
# Set to false to teleport instantly.
spawn-countdown: true

# Duration of the /spawn countdown in seconds. Only applies if spawn-countdown is true.
spawn-countdown-seconds: 3

# ┌─────────────────────────────────────────────────────────┐
# │                    Kick Settings                        │
# └─────────────────────────────────────────────────────────┘

# Should the server announce in chat when a player is kicked?
announce-kick: true

# ┌─────────────────────────────────────────────────────────┐
# │                     Ban Settings                        │
# └─────────────────────────────────────────────────────────┘

# Should the server announce in chat when a player is banned?
announce-ban: true

# Should the server announce in chat when a player is unbanned?
announce-unban: true

# Should the server announce in chat when an IP is banned?
# The announcement shows the player's name, not their IP address.
announce-banip: true

# The link shown on the ban screen for players to appeal their ban.
# Set to "" to hide the appeal line entirely.
ban-appeal-link: "https://discord.gg/yourlink"

# ┌─────────────────────────────────────────────────────────┐
# │                    Mute Settings                        │
# └─────────────────────────────────────────────────────────┘

# Should the server announce in chat when a player is muted?
announce-mute: true

# Should the server announce in chat when a player is unmuted?
announce-unmute: true

# ┌─────────────────────────────────────────────────────────┐
# │                    Warn Settings                        │
# └─────────────────────────────────────────────────────────┘

# Should the server announce in chat when a player is warned?
announce-warn: true

# Automatic punishments triggered when a player reaches a certain number of warnings.
#
# Supported actions:
#   kick    - Kicks the player with the given reason
#   mute    - Mutes the player (prevents chatting)
#   tempban - Temporarily bans the player (requires a "duration" field, e.g. "1d", "12h", "30m")
#   ban     - Permanently bans the player
#
# Add or remove thresholds as needed. Set to {} to disable all auto-punishments.

warn-punishments:
  3:
    action: kick
    reason: "You have accumulated 3 warnings."
  5:
    action: mute
    reason: "You have accumulated 5 warnings."
  7:
    action: tempban
    duration: "1d"
    reason: "You have accumulated 7 warnings."
  10:
    action: ban
    reason: "You have accumulated 10 warnings."

# ┌─────────────────────────────────────────────────────────┐
# │                     TPA Settings                        │
# └─────────────────────────────────────────────────────────┘

# Show a countdown title on screen when a TPA request is accepted.
# Set to false to only use chat messages.
tpa-title-countdown: true

# Duration of the TPA teleport countdown in seconds.
tpa-countdown-seconds: 3

# ┌─────────────────────────────────────────────────────────┐
# │                   InvSee Settings                       │
# └─────────────────────────────────────────────────────────┘

# When true, players viewing another player's inventory via /invsee cannot
# move, take, or modify any items. Set to false to allow full interaction.
invsee-read-only: true

# ┌─────────────────────────────────────────────────────────┐
# │                   Vanish Settings                       │
# └─────────────────────────────────────────────────────────┘

# Broadcast a fake quit message to non-staff when a player vanishes,
# and a fake join message when they unvanish — making it look like they disconnected.
vanish-fake-join-quit: true

# Show a ghost/transparent effect (spectator appearance) to staff with
# the Axentra.vanish.see permission. Requires NMS reflection at runtime.
# Disable this if you experience issues with your server version.
vanish-ghost-effect: true

# Apply night vision to the vanished player so they can see in dark areas.
vanish-night-vision: true

# Prevent the vanished player from taking any damage.
vanish-god-mode: true

# Prevent the vanished player from picking up items.
vanish-no-pickup: true

# Show a persistent action bar reminder to the vanished player.
vanish-action-bar: true

# How often the action bar reminder is shown, in ticks (20 ticks = 1 second).
vanish-action-bar-interval: 40

