# The prefix shown before all plugin messages.
prefix: "&b&lAxentra &8» "

# ┌─────────────────────────────────────────────────────────┐
# │                  Join & Leave Messages                  │
# └─────────────────────────────────────────────────────────┘
#
#  Set to "none" to use the default Minecraft message,
#  or set to "" to hide the message entirely.
#
#  Variables:
#    %player%      - The player's name
#    %playercount% - The current number of online players

join: "&a+ &e%player% &ahas joined the game! &8[&7%playercount%&8]"
quit: "&c- &e%player% &chas left the game! &8[&7%playercount%&8]"
first-join: "&6★ &e%player% &6joined for the first time! Welcome!"

# ┌─────────────────────────────────────────────────────────┐
# │                   General Messages                      │
# └─────────────────────────────────────────────────────────┘

no-player: "%prefix%&cOnly players can use this command!"
no-permission: "%prefix%&cYou don't have permission to use this command!"
player-not-found: "%prefix%&cPlayer &e%player% &cwas not found!"

# ┌─────────────────────────────────────────────────────────┐
# │                    Clear Command                        │
# └─────────────────────────────────────────────────────────┘
#
#  Variables:
#    %player% - The target player's name

clear-inventory: "%prefix%&aYour inventory has been cleared!"
clear-other: "%prefix%&aCleared the inventory of &e%player%&a!"

# ┌─────────────────────────────────────────────────────────┐
# │                   Repair Command                        │
# └─────────────────────────────────────────────────────────┘

repair-success: "%prefix%&aYour item has been repaired!"
repair-no-item: "%prefix%&cYou are not holding an item!"
repair-not-damaged: "%prefix%&cYour item is not damaged!"

# ┌─────────────────────────────────────────────────────────┐
# │                    Kick Command                         │
# └─────────────────────────────────────────────────────────┘
#
#  Variables:
#    %player% - The kicked player's name
#    %reason% - The kick reason

kick-usage: "%prefix%&cUsage: /kick <player> [reason]"
kick-default-reason: "You have been kicked!"
kick-message: "&cYou have been kicked!\n&7Reason: &f%reason%"
kick-success: "%prefix%&aSuccessfully kicked &e%player% &afor: &7%reason%"
kick-announce: "%prefix%&e%player% &chas been kicked for: &7%reason%"

# ┌─────────────────────────────────────────────────────────┐
# │                 TempBan & Ban Commands                  │
# └─────────────────────────────────────────────────────────┘
#
#  Variables:
#    %player%    - The banned player's name
#    %reason%    - The ban reason
#    %duration%  - The ban duration (tempban only)
#    %banned-by% - The staff member who issued the ban
#    %appeal%    - The ban appeal link from config.yml

tempban-usage: "%prefix%&cUsage: /tempban <player> <duration> [reason]"
tempban-invalid-duration: "%prefix%&cInvalid duration! Use a combination of &e1d&c, &e2h&c, &e30m&c, &e10s&c."
tempban-default-reason: "You have been temporarily banned!"
tempban-message: "&cYou have been temporarily banned!\n&7Reason: &f%reason%\n&7Duration: &f%duration%\n&7Banned by: &f%banned-by%\n&7Appeal: &f%appeal%"
tempban-success: "%prefix%&aSuccessfully temp-banned &e%player% &afor &e%duration% &afor: &7%reason%"
tempban-announce: "%prefix%&e%player% &chas been temp-banned for &e%duration%&c: &7%reason%"

ban-usage: "%prefix%&cUsage: /ban <player> [reason]"
ban-default-reason: "You have been banned!"
ban-message: "&cYou have been banned!\n&7Reason: &f%reason%\n&7Banned by: &f%banned-by%\n&7Appeal: &f%appeal%"
ban-success: "%prefix%&aSuccessfully banned &e%player% &afor: &7%reason%"
ban-announce: "%prefix%&e%player% &chas been banned for: &7%reason%"
ban-already-banned: "%prefix%&e%player% &cis already banned!"

# ┌─────────────────────────────────────────────────────────┐
# │                    Unban Command                        │
# └─────────────────────────────────────────────────────────┘
#
#  Variables:
#    %player% - The unbanned player's name

unban-usage: "%prefix%&cUsage: /unban <player>"
unban-success: "%prefix%&aSuccessfully unbanned &e%player%&a!"
unban-announce: "%prefix%&e%player% &ahas been unbanned!"
unban-not-banned: "%prefix%&e%player% &cis not banned!"

# ┌─────────────────────────────────────────────────────────┐
# │              TempBanIP & BanIP Commands                 │
# └─────────────────────────────────────────────────────────┘
#
#  Variables:
#    %ip%        - The banned IP address
#    %player%    - The player associated with the IP
#    %reason%    - The ban reason
#    %duration%  - The ban duration (tempbanip only)
#    %banned-by% - The staff member who issued the ban
#    %appeal%    - The ban appeal link from config.yml

tempbanip-usage: "%prefix%&cUsage: /tempbanip <player|ip> <duration> [reason]"
tempbanip-default-reason: "Your IP has been temporarily banned!"
tempbanip-message: "&cYour IP has been temporarily banned!\n&7Reason: &f%reason%\n&7Duration: &f%duration%\n&7Banned by: &f%banned-by%\n&7Appeal: &f%appeal%"
tempbanip-success: "%prefix%&aSuccessfully temp-banned IP &e%ip% &afor &e%duration% &afor: &7%reason%"
tempbanip-announce: "%prefix%&e%player%'s &cIP has been temp-banned for &e%duration%&c: &7%reason%"

banip-usage: "%prefix%&cUsage: /banip <player|ip> [reason]"
banip-default-reason: "Your IP has been banned!"
banip-no-address: "%prefix%&cCould not retrieve the address of &e%player%&c!"
banip-already-banned: "%prefix%&e%ip% &cis already banned!"
banip-message: "&cYour IP has been banned!\n&7Reason: &f%reason%\n&7Banned by: &f%banned-by%\n&7Appeal: &f%appeal%"
banip-success: "%prefix%&aSuccessfully banned IP &e%ip% &afor: &7%reason%"
banip-announce: "%prefix%&e%player%'s &cIP has been banned for: &7%reason%"

# ┌─────────────────────────────────────────────────────────┐
# │                   UnbanIP Command                       │
# └─────────────────────────────────────────────────────────┘
#
#  Variables:
#    %ip% - The unbanned IP address

unbanip-usage: "%prefix%&cUsage: /unbanip <ip>"
unbanip-success: "%prefix%&aSuccessfully unbanned IP &e%ip%&a!"
unbanip-not-banned: "%prefix%&eIP %ip% &cis not banned!"

# ┌─────────────────────────────────────────────────────────┐
# │                    Fly Command                          │
# └─────────────────────────────────────────────────────────┘
#
#  Variables:
#    %player% - The target player's name (fly-other only)

fly-enabled: "%prefix%&aFlight has been enabled!"
fly-disabled: "%prefix%&cFlight has been disabled!"
fly-other-enabled: "%prefix%&aFlight enabled for &e%player%&a!"
fly-other-disabled: "%prefix%&cFlight disabled for &e%player%&c!"

# ┌─────────────────────────────────────────────────────────┐
# │                    Feed Command                         │
# └─────────────────────────────────────────────────────────┘
#
#  Variables:
#    %player% - The feeder's name (feed-received) or target's name (feed-other)

feed-self: "%prefix%&aYou have been fed!"
feed-other: "%prefix%&aSuccessfully fed &e%player%&a!"
feed-received: "%prefix%&aYou have been fed by &e%player%&a!"

# ┌─────────────────────────────────────────────────────────┐
# │                    Heal Command                         │
# └─────────────────────────────────────────────────────────┘
#
#  Variables:
#    %player% - The healer's name (heal-received) or target's name (heal-other)

heal-self: "%prefix%&aYou have been healed!"
heal-other: "%prefix%&aSuccessfully healed &e%player%&a!"
heal-received: "%prefix%&aYou have been healed by &e%player%&a!"

# ┌─────────────────────────────────────────────────────────┐
# │                    Warn Command                         │
# └─────────────────────────────────────────────────────────┘
#
#  Variables:
#    %player% - The warned player's name
#    %reason% - The warn reason
#    %count%  - The player's total active warn count

warn-usage: "%prefix%&cUsage: /warn <player> [reason]"
warn-default-reason: "Breaking the rules!"
warn-message: "%prefix%&eYou have been warned! &7Reason: &f%reason% &8(&e%count% total&8)"
warn-success: "%prefix%&aWarned &e%player% &afor: &7%reason% &8(&e%count% total warns&8)"
warn-announce: "%prefix%&e%player% &chas been warned for: &7%reason% &8(&e%count% warns&8)"
warn-punishment-kick-message: "&cYou have been kicked!\n&7Reason: &f%reason%"
warn-punishment-announce: "%prefix%&e%player% &chas been &e%action% &cafter reaching &e%count% &cwarnings."

# ┌─────────────────────────────────────────────────────────┐
# │                   Warns Command                         │
# └─────────────────────────────────────────────────────────┘

warns-usage: "%prefix%&cUsage: /warns [player]"
warns-none: "%prefix%&e%player% &ahas no active warnings."
warns-error: "%prefix%&cFailed to retrieve warnings."

# ┌─────────────────────────────────────────────────────────┐
# │                 ClearWarns Command                      │
# └─────────────────────────────────────────────────────────┘

clearwarns-usage: "%prefix%&cUsage: /clearwarns <player>"
clearwarns-success: "%prefix%&aCleared all warnings for &e%player%&a!"
clearwarns-none: "%prefix%&e%player% &chas no active warnings to clear."

# ┌─────────────────────────────────────────────────────────┐
# │                    Mute Command                         │
# └─────────────────────────────────────────────────────────┘
#
#  Variables:
#    %player% - The muted player's name
#    %reason% - The mute reason

mute-usage: "%prefix%&cUsage: /mute <player> [reason]"
mute-default-reason: "You have been muted!"
mute-message: "%prefix%&cYou have been muted!\n&7Reason: &f%reason%"
mute-success: "%prefix%&aSuccessfully muted &e%player% &afor: &7%reason%"
mute-announce: "%prefix%&e%player% &chas been muted for: &7%reason%"
mute-already-muted: "%prefix%&e%player% &cis already muted!"
mute-blocked: "%prefix%&cYou are muted and cannot chat!"

# ┌─────────────────────────────────────────────────────────┐
# │                   Unmute Command                        │
# └─────────────────────────────────────────────────────────┘
#
#  Variables:
#    %player% - The unmuted player's name

unmute-usage: "%prefix%&cUsage: /unmute <player>"
unmute-success: "%prefix%&aSuccessfully unmuted &e%player%&a!"
unmute-announce: "%prefix%&e%player% &ahas been unmuted!"
unmute-not-muted: "%prefix%&e%player% &cis not muted!"

# ┌─────────────────────────────────────────────────────────┐
# │                 Cartography Command                     │
# └─────────────────────────────────────────────────────────┘

cartography-open: "%prefix%&aOpened a cartography table!"

# ┌─────────────────────────────────────────────────────────┐
# │                    Ping Command                         │
# └─────────────────────────────────────────────────────────┘
#
#  Variables:
#    %ping%   - The ping in milliseconds
#    %player% - The target player's name

ping-self: "%prefix%&aYour ping is &e%ping%ms&a!"
ping-other: "%prefix%&e%player%&a's ping is &e%ping%ms&a!"

# ┌─────────────────────────────────────────────────────────┐
# │                   Suicide Command                       │
# └─────────────────────────────────────────────────────────┘

suicide-success: "%prefix%&cYou have taken your own life."

# ┌─────────────────────────────────────────────────────────┐
# │                   Weather Command                       │
# └─────────────────────────────────────────────────────────┘

weather-usage: "%prefix%&cUsage: /weather <clear|rain|storm>"
weather-clear: "%prefix%&aWeather set to &eclear&a!"
weather-rain: "%prefix%&aWeather set to &erain&a!"
weather-storm: "%prefix%&aWeather set to &estorm&a!"

# ┌─────────────────────────────────────────────────────────┐
# │                    Hat Command                          │
# └─────────────────────────────────────────────────────────┘

hat-success: "%prefix%&aYour hat has been equipped!"
hat-no-item: "%prefix%&cYou must be holding an item!"

# ┌─────────────────────────────────────────────────────────┐
# │                   Speed Command                         │
# └─────────────────────────────────────────────────────────┘
#
#  Variables:
#    %speed%  - The speed value (1-10)
#    %type%   - walk or fly
#    %player% - The target player's name

speed-usage: "%prefix%&cUsage: /speed <1-10|reset> [walk|fly] [player] &8(&71 = default&8)"
speed-invalid: "%prefix%&cInvalid speed! Use a number &e1&c-&e10 &cor &ereset&c."
speed-self: "%prefix%&a%type% speed set to &e%speed%&a!"
speed-other: "%prefix%&aSet &e%player%&a's %type% speed to &e%speed%&a!"
speed-received: "%prefix%&aYour %type% speed was set to &e%speed% &aby &e%player%&a!"
speed-reset: "%prefix%&a%type% speed reset to default!"
speed-reset-other: "%prefix%&aReset &e%player%&a's %type% speed to default!"
speed-reset-received: "%prefix%&aYour %type% speed was reset to default by &e%player%&a!"

# ┌─────────────────────────────────────────────────────────┐
# │                  Gamemode Command                       │
# └─────────────────────────────────────────────────────────┘
#
#  Variables:
#    %gamemode% - The gamemode name (e.g. Creative)
#    %player%   - The target player's name

gamemode-usage: "%prefix%&cUsage: /gamemode <survival|creative|adventure|spectator> [player]"
gamemode-invalid: "%prefix%&cInvalid gamemode: &e%mode%&c! Use survival, creative, adventure, or spectator."
gamemode-self: "%prefix%&aGamemode set to &e%gamemode%&a!"
gamemode-other: "%prefix%&aSet &e%player%&a's gamemode to &e%gamemode%&a!"
gamemode-received: "%prefix%&aYour gamemode has been set to &e%gamemode% &aby &e%player%&a!"

# ┌─────────────────────────────────────────────────────────┐
# │                    Time Command                         │
# └─────────────────────────────────────────────────────────┘
#
#  Variables:
#    %time% - The time value or name that was set/added

time-usage: "%prefix%&cUsage: /time <set|add> <day|noon|night|midnight|ticks>"
time-invalid: "%prefix%&cInvalid time value: &e%value%&c! Use day, noon, night, midnight, or a number."
time-set: "%prefix%&aTime set to &e%time%&a!"
time-add: "%prefix%&aAdded &e%time% &aticks to the world time!"

# ┌─────────────────────────────────────────────────────────┐
# │                    Back Command                         │
# └─────────────────────────────────────────────────────────┘

back-success: "%prefix%&aTeleported to your previous location!"
back-no-location: "%prefix%&cNo previous location found!"

# ┌─────────────────────────────────────────────────────────┐
# │                    TPA Commands                         │
# └─────────────────────────────────────────────────────────┘
#
#  Variables:
#    %player%  - The other player's name
#    %seconds% - The request timeout in seconds

tpa-usage: "%prefix%&cUsage: /tpa <player>"
tpa-self: "%prefix%&cYou cannot send a teleport request to yourself!"
tpa-sent: "%prefix%&aTeleport request sent to &e%player%&a!"
tpa-received: "%prefix%&e%player% &ahas requested to teleport to you! Use &e/tpaccept &aor &e/tpdeny &7(&e%seconds%s&7)"
tpa-expired-requester: "%prefix%&cYour teleport request to &e%player% &chas expired!"
tpa-expired-target: "%prefix%&cThe teleport request from &e%player% &chas expired!"
tpa-accept-requester: "%prefix%&aRequest accepted! Stand still..."
tpa-accept-target: "%prefix%&aYou accepted &e%player%&a's teleport request!"
tpa-deny-requester: "%prefix%&e%player% &cdenied your teleport request!"
tpa-deny-target: "%prefix%&cYou denied &e%player%&c's teleport request!"
tpa-cancel-requester: "%prefix%&aYour teleport request to &e%player% &ahas been cancelled!"
tpa-cancelled-target: "%prefix%&e%player% &ccancelled their teleport request!"
tpa-no-request: "%prefix%&cYou have no pending teleport requests!"
tpa-no-outgoing: "%prefix%&cYou have no outgoing teleport requests!"
tpa-requester-offline: "%prefix%&cThe player who sent the request is no longer online!"
tpa-target-offline: "%prefix%&cThe player went offline before you could teleport!"
tpa-toggled-off: "%prefix%&e%player% &chas teleport requests disabled!"
tptoggle-enabled: "%prefix%&aYou can now receive teleport requests!"
tptoggle-disabled: "%prefix%&cYou will no longer receive teleport requests!"
tpa-countdown-title: "&a%seconds%"
tpa-countdown-subtitle: "&7Do not move!"
tpa-moved-title: "&cTeleport Cancelled!"
tpa-moved-subtitle: "&7You moved."
tpa-moved: "%prefix%&cTeleport cancelled! Don't move during the countdown."
tpa-teleported-title: "&aTeleported!"
tpa-teleported-subtitle: "&7You were teleported to &e%player%&7."

# ┌─────────────────────────────────────────────────────────┐
# │                    God Command                          │
# └─────────────────────────────────────────────────────────┘
#
#  Variables:
#    %player% - The target or sender's name (others only)

god-enabled: "%prefix%&aGod mode &2enabled&a!"
god-disabled: "%prefix%&cGod mode &4disabled&c!"
god-enabled-other: "%prefix%&aGod mode enabled for &e%player%&a!"
god-disabled-other: "%prefix%&cGod mode disabled for &e%player%&c!"
god-other-enabled: "%prefix%&aYour god mode was enabled by &e%player%&a!"
god-other-disabled: "%prefix%&cYour god mode was disabled by &e%player%&c!"

# ┌─────────────────────────────────────────────────────────┐
# │                   Axentra Command                       │
# └─────────────────────────────────────────────────────────┘
#
#  Variables:
#    %version% - The current plugin version
#    %current% - The current plugin version (upgrade)
#    %latest%  - The latest available version (upgrade)

axentra-usage: "%prefix%&cUsage: /axentra <reload | upgrade | help | information>"
reload-success: "%prefix%&aThe plugin has been reloaded!"
upgrade-checking: "%prefix%&eChecking for updates..."
upgrade-up-to-date: "%prefix%&aYou are running the latest version! &7(%version%)"
upgrade-available: "%prefix% &aNew update available! &7%current% &f→ &a%latest%"
upgrade-failed: "%prefix%&cFailed to check for updates, please try again later."

