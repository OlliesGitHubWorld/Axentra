# ┌─────────────────────────────────────────────────────────┐
# │                    Kick Settings                        │
# └─────────────────────────────────────────────────────────┘

# Should the server announce in chat when a player is kicked?
announce-kick: true

# ┌─────────────────────────────────────────────────────────┐
# │                     Ban Settings                        │
# └─────────────────────────────────────────────────────────┘

# Should the server announce in chat when a player is banned?
announce-ban: true

# Should the server announce in chat when a player is unbanned?
announce-unban: true

# The link shown on the ban screen for players to appeal their ban.
# Set to "" to hide the appeal line entirely.
ban-appeal-link: "https://discord.gg/yourlink"

